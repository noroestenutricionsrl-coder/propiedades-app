{% extends 'core/base.html' %}
{% block title %}{{ titulo }}{% endblock %}
{% block page_title %}{{ titulo }}{% endblock %}
{% block content %}
<div style="max-width:560px">
  <div class="card">
    <div class="card-body" style="padding:28px">
      {% if error %}
      <div style="background:#fdecea;border-left:4px solid #c0392b;padding:12px 16px;border-radius:8px;margin-bottom:20px;color:#c0392b;font-size:0.875rem">
        <i class="fa-solid fa-circle-exclamation"></i> {{ error }}
      </div>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="form-group">
            <label class="form-label">Nombre</label>
            <input type="text" name="first_name" class="form-control" value="{{ usuario.first_name|default:'' }}" required>
          </div>
          <div class="form-group">
            <label class="form-label">Apellido</label>
            <input type="text" name="last_name" class="form-control" value="{{ usuario.last_name|default:'' }}">
          </div>
        </div>
        {% if accion == 'crear' %}
        <div class="form-group">
          <label class="form-label">Nombre de usuario <span style="color:#c0392b">*</span></label>
          <input type="text" name="username" class="form-control" placeholder="sin espacios, ej: maria.garcia" required>
        </div>
        {% endif %}
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" value="{{ usuario.email|default:'' }}" placeholder="email@ejemplo.com">
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña {% if accion == 'editar' %}<span style="color:#aaa;font-weight:400">(dejar vacío para no cambiar)</span>{% else %}<span style="color:#c0392b">*</span>{% endif %}</label>
          <input type="password" name="password" class="form-control" placeholder="••••••••" {% if accion == 'crear' %}required{% endif %}>
        </div>
        <div class="form-group">
          <label class="form-label">Rol</label>
          <select name="rol" class="form-control">
            <option value="admin" {% if perfil.rol == 'admin' %}selected{% endif %}>Administrador</option>
            <option value="operador" {% if perfil.rol == 'operador' %}selected{% endif %}>Operador</option>
            <option value="consulta" {% if not perfil or perfil.rol == 'consulta' %}selected{% endif %}>Consulta</option>
          </select>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="form-group">
            <label class="form-label">Días de anticipación</label>
            <input type="number" name="dias_anticipacion" class="form-control" value="{{ perfil.dias_anticipacion|default:'7' }}" min="1" max="30">
          </div>
          <div class="form-group" style="display:flex;align-items:center;gap:10px;padding-top:24px">
            <input type="checkbox" name="notif_email" id="notif_email" class="form-check-input" {% if perfil and perfil.notif_email %}checked{% endif %} style="width:18px;height:18px">
            <label for="notif_email" class="form-label" style="margin:0;text-transform:none;font-size:0.9rem">Recibir alertas por email</label>
          </div>
        </div>
        <div style="display:flex;gap:10px;margin-top:8px">
          <button type="submit" class="btn btn-primary"><i class="fa-solid fa-check"></i> Guardar</button>
          <a href="{% url 'usuarios_lista' %}" class="btn btn-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
