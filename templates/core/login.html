<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión — Gestión de Propiedades</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #1a5c3a;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-card {
  background: white;
  border-radius: 16px;
  padding: 48px 44px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.25);
}
.login-logo {
  text-align: center;
  margin-bottom: 32px;
}
.login-logo i {
  font-size: 2.2rem;
  color: #1a5c3a;
  margin-bottom: 12px;
  display: block;
}
.login-logo h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.5rem;
  color: #1c2b20;
}
.login-logo p {
  font-size: 0.82rem;
  color: #5a7060;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 4px;
}
.form-group { margin-bottom: 18px; }
.form-label {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  color: #5a7060;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 7px;
}
.form-control {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid #d4e3d9;
  border-radius: 8px;
  font-size: 0.95rem;
  font-family: 'DM Sans', sans-serif;
  color: #1c2b20;
  transition: border-color 0.15s;
}
.form-control:focus {
  outline: none;
  border-color: #2d8653;
  box-shadow: 0 0 0 3px rgba(45,134,83,0.1);
}
.btn-login {
  width: 100%;
  padding: 13px;
  background: #1a5c3a;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  margin-top: 8px;
  transition: background 0.15s;
  letter-spacing: 0.03em;
}
.btn-login:hover { background: #2d8653; }
.error-msg {
  background: #fdecea;
  color: #c0392b;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 0.85rem;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <i class="fa-solid fa-building-columns"></i>
    <h1>Gestión de Propiedades</h1>
    <p>Panel de Administración</p>
  </div>
  {% if error %}
  <div class="error-msg"><i class="fa-solid fa-circle-exclamation"></i> {{ error }}</div>
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label">Usuario</label>
      <input type="text" name="username" class="form-control" autofocus required placeholder="nombre de usuario">
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input type="password" name="password" class="form-control" required placeholder="••••••••">
    </div>
    <button type="submit" class="btn-login">Ingresar</button>
  </form>
</div>
</body>
</html>
